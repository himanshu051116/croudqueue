name: CrowdCue CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crowdcue
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d crowdcue"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/crowdcue
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      ENABLE_DEMO_FAULT_INJECTION: "true"
      GEMINI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-runtime.txt
            requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - name: Secret scan
        run: python scripts/secret-scan.py
      - name: Backend quality
        run: |
          black --check backend/app backend/tests backend/alembic scripts
          isort --check-only backend/app backend/tests backend/alembic scripts
          flake8 backend/app backend/tests backend/alembic scripts
          mypy --explicit-package-bases backend/app
      - name: PostgreSQL migrations and drift check
        run: |
          alembic -c backend/alembic.ini upgrade head
          alembic -c backend/alembic.ini check
      - name: Seed reference data
        run: python -m scripts.seed_database
      - name: PostgreSQL-backed tests
        run: |
          pytest backend/tests -q --cov=backend.app --cov-branch \
            --cov-report=xml:reports/coverage.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-reports
          path: reports/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm run build
      - working-directory: frontend
        run: npm audit --audit-level=moderate

  golden-flow-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crowdcue
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d crowdcue"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/crowdcue
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      ENABLE_DEMO_FAULT_INJECTION: "true"
      GEMINI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-runtime.txt
            requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: pip install -r requirements-runtime.txt
      - run: alembic -c backend/alembic.ini upgrade head
      - run: python -m scripts.seed_database
      - name: Start backend
        run: |
          mkdir -p reports
          nohup uvicorn backend.app.main:app --host 127.0.0.1 --port 8001 \
            > reports/e2e-backend.log 2>&1 &
          ready=0
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8001/api/health/ready; then
              ready=1
              break
            fi
            sleep 1
          done
          test "$ready" = "1"
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npx playwright install --with-deps chromium
      - working-directory: frontend
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
            reports/e2e-backend.log
